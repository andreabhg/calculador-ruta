<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Ruta - Open Source</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="container">
        <h2>Simulador de Ruta Inteligente</h2>
        <form id="route-form">
            <div class="form-group">
                <label for="origin">Punto A (Origen):</label>
                <input type="text" id="origin" placeholder="Ej: Providencia, Santiago, Chile" required>
            </div>
            <div class="form-group">
                <label for="destination">Punto B (Destino):</label>
                <input type="text" id="destination" placeholder="Ej: El Tambo, San Vicente, Chile" required>
            </div>

            <div class="form-row">
                <div class="form-group ½">
                    <label for="car-model">Auto (Marca y Modelo):</label>
                    <input type="text" id="car-model" placeholder="Ej: Suzuki Swift" required>
                </div>
                <div class="form-group ½">
                    <label for="engine-size">Motor (Litros):</label>
                    <input type="text" id="engine-size" placeholder="Ej: 1.2" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group ½">
                    <label for="passengers">N° de Pasajeros:</label>
                    <input type="number" id="passengers" min="1" value="1" required>
                </div>
                <div class="form-group ½">
                    <label for="fuel-price">Precio Bencina (CLP):</label>
                    <input type="number" id="fuel-price" placeholder="Ej: 1350" required>
                </div>
            </div>

            <button type="submit">Calcular Ruta y Consumo</button>
        </form>

        <div id="result" class="result-box" style="display: none;">
            <h3>Resumen del Viaje</h3>
            <p><strong>Distancia en mapa:</strong> <span id="distance-output">0 km</span></p>
            <div id="gemini-loading" style="display: none; color: #7f8c8d; font-style: italic;">
                Consultando a Gemini para estimar el consumo...
            </div>
            <div id="gemini-output"></div>
        </div>

        <div id="map"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
