<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Ruta - Consumo Vehicular</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Simulador de Ruta</h2>
        <form id="route-form">
            <div class="form-group">
                <label for="origin">Punto A (Origen):</label>
                <input type="text" id="origin" placeholder="Ej: Providencia, Santiago" required>
            </div>
            <div class="form-group">
                <label for="destination">Punto B (Destino):</label>
                <input type="text" id="destination" placeholder="Ej: Las Cruces, Región de Valparaíso" required>
            </div>
            <button type="submit">Calcular Kilómetros</button>
        </form>

        <div id="result" class="result-box" style="display: none;">
            <p><strong>Distancia total de viaje:</strong> <span id="distance-output">0 km</span></p>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY_AQUI&callback=initMap&v=weekly" defer></script>
    <script src="script.js"></script>
</body>
</html>
